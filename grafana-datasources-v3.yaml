apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: logging-demo
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.logging-demo.svc.cluster.local:80
        isDefault: true
        jsonData:
          maxLines: 1000
  prometheus-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring-demo.svc.cluster.local:80
        isDefault: false
        jsonData:
          timeInterval: "15s"
  tempo-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.tracing-demo.svc.cluster.local:3200
        isDefault: false
