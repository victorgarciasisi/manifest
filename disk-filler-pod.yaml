apiVersion: v1
kind: Pod
metadata:
  name: disk-filler
  namespace: monitoring-demo
  labels:
    app: disk-filler
spec:
  containers:
    - name: filler
      image: alpine:3.20
      command: ["sh","-c"]
      args:
        - |
          set -eux
          SIZE_GB="${FILL_GB:-13}"
          mkdir -p /data
          # Crear archivo de SIZE_GB usando busybox dd (sin 'status=progress')
          dd if=/dev/zero of=/data/fillfile bs=1M count=$((SIZE_GB*1024))
          sync
          df -h /data || true
          echo "Archivo de ${SIZE_GB}Gi creado. Mantengo el pod vivo."
          tail -f /dev/null
      env:
        - name: FILL_GB
          value: "13"
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      emptyDir:
        sizeLimit: "15Gi"
  restartPolicy: Never
