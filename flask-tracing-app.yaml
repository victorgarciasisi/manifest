apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-tracing-app
  namespace: apps-demo
  labels:
    app: flask-tracing-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-tracing-app
  template:
    metadata:
      labels:
        app: flask-tracing-app
      annotations:
        otel.service.name: "flask-tracing-app"
    spec:
      containers:
        - name: flask-tracing-app
          image: signoz/sample-flask-app:v0.3
          imagePullPolicy: IfNotPresent
          env:
            - name: MONGO_URI
              value: "mongodb://mongo-tracing.apps-demo.svc.cluster.local:27017"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=flask-tracing-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.tracing-demo.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
          ports:
            - containerPort: 5002
---
apiVersion: v1
kind: Service
metadata:
  name: flask-tracing-app
  namespace: apps-demo
  labels:
    app: flask-tracing-app
spec:
  selector:
    app: flask-tracing-app
  ports:
    - name: http
      port: 80
      targetPort: 5002
  type: ClusterIP
