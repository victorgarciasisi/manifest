apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring-demo
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: 'default-receiver'
      group_by: ['alertname', 'job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 2h

    receivers:
      - name: 'default-receiver'
        webhook_configs:
          - url: 'http://alert-webhook.monitoring-demo.svc.cluster.local:8080/'

