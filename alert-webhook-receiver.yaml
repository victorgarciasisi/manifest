apiVersion: v1
kind: Service
metadata:
  name: alert-webhook
  namespace: monitoring-demo
spec:
  selector:
    app: alert-webhook
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-webhook
  namespace: monitoring-demo
  labels:
    app: alert-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-webhook
  template:
    metadata:
      labels:
        app: alert-webhook
    spec:
      containers:
        - name: http-echo
          image: mendhak/http-https-echo:38
          env:
            - name: HTTP_PORT
              value: "8080"
          ports:
            - containerPort: 8080
