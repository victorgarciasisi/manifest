apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring-demo
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v3.7.3
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-storage
              mountPath: /prometheus
            - name: prometheus-rules
              mountPath: /etc/prometheus/rules
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-storage
          emptyDir: {}
        - name: prometheus-rules
          configMap:
            name: prometheus-rules
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring-demo
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: http
      port: 80
      targetPort: 9090
