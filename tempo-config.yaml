apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: tracing-demo
data:
  tempo.yaml: |
    # Opcional: desactivar multi-tenant para laboratorio
    multitenancy_enabled: false

    server:
      http_listen_port: 3200

    # El distributor es quien define los receivers (OTLP, Jaeger, Zipkin, etc.)
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
            http:
              endpoint: "0.0.0.0:4318"

    ingester:
      trace_idle_period: 10s
      max_block_bytes: 1000000
      max_block_duration: 5m

    compactor:
      compaction:
        compaction_window: 1h
        max_block_bytes: 1000000
        # Ejemplo de retención (opcional en tu lab)
        # block_retention: 24h
        # compacted_block_retention: 1h

    metrics_generator:
      registry:
        external_labels:
          source: tempo
      storage:
        path: /tmp/metrics
        remote_write:
          - url: ""

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

